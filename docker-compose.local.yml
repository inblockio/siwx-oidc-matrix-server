# Local development / smoke-test compose file.
# No proxy, no letsencrypt, no TLS.
# Usage: see start-local.sh
#
# Network layout:
#   siwx-oidc listens on 0.0.0.0:18081 (exposed to host as localhost:18081)
#   matrix_synapse listens on 0.0.0.0:18080 (exposed to host as localhost:18080)
#   OIDC issuer URL is http://host.docker.internal:18081 so that:
#     - Matrix container resolves it via extra_hosts -> host gateway
#     - Browser on host reaches it via localhost:18081 (add host.docker.internal to /etc/hosts if needed)

services:
  matrix_synapse:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "18080:18080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SYNAPSE_SERVER_NAME: localhost
      SYNAPSE_REPORT_STATS: "no"
      MATRIX_HOST: localhost
      MATRIX_PORT: "18080"
      MATRIX_BASE_URL: "http://localhost:18080"
      MATRIX_OIDC_CLIENT_ID: testclient123
      MATRIX_OIDC_SECRET_ID: testsecret456
      MATRIX_MESSAGE_LIFETIME: "4w"
      SIWXOIDC_BASE_URL: "http://host.docker.internal:18081"
      LOCAL_DEV: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:18080/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
    depends_on:
      - siwx-oidc
    volumes:
      - matrix_data_local:/data

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  siwx-oidc:
    build:
      context: ../siwx-oidc
      dockerfile: Dockerfile
      additional_contexts:
        aqua-auth: ../aqua-auth
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "18081:18081"
    environment:
      SIWXOIDC_REDIS_URL: "redis://redis"
      SIWXOIDC_ADDRESS: "0.0.0.0"
      SIWXOIDC_HOST: "host.docker.internal"
      SIWXOIDC_PORT: "18081"
      SIWXOIDC_BASE_URL: "http://host.docker.internal:18081"
      SIWXOIDC_SUPPORTED_NAMESPACES: "eip155,ed25519,p256"
      RUST_LOG: "siwx_oidc=debug,tower_http=trace"
    env_file:
      - .env.local
    restart: unless-stopped

volumes:
  matrix_data_local:
