services:
  matrix_synapse:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "8448:8448"
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_HOST}
      SYNAPSE_REPORT_STATS: ${MATRIX_REPORT_STATS}
      VIRTUAL_HOST: ${MATRIX_HOST}
      VIRTUAL_PORT: ${MATRIX_PORT}
      LETSENCRYPT_HOST: ${MATRIX_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    env_file:
      - .env
    depends_on:
      - siwx-oidc
      - proxy
      - letsencrypt
    volumes:
      - matrix_data:/data
      - proxy_data_certs:/certs:rw

  redis:
    image: redis
    healthcheck:
      test: [ "CMD", "redis-cli","ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  siwx-oidc:
    build:
      context: ../siwx-oidc
      dockerfile: Dockerfile
      additional_contexts:
        aqua-auth: ../aqua-auth
    depends_on:
      - redis
    ports:
      - ${SIWXOIDC_PORT}:${SIWXOIDC_PORT}
    environment:
      SIWXOIDC_REDIS_URL: "redis://redis"
      SIWXOIDC_ADDRESS: 0.0.0.0
      SIWXOIDC_HOST: ${SIWXOIDC_HOST}
      SIWXOIDC_PORT: ${SIWXOIDC_PORT}
      SIWXOIDC_DEFAULT_CLIENTS: ${SIWXOIDC_DEFAULT_CLIENTS}
      SIWXOIDC_BASE_URL: ${SIWXOIDC_BASE_URL}
      SIWXOIDC_SUPPORTED_NAMESPACES: ${SIWXOIDC_SUPPORTED_NAMESPACES:-eip155,ed25519,p256}
      RUST_LOG: ${RUST_LOG}
      VIRTUAL_HOST: ${SIWXOIDC_HOST}
      VIRTUAL_PORT: ${SIWXOIDC_PORT}
      LETSENCRYPT_HOST: ${SIWXOIDC_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}

  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: proxy_server_proxy_1
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy=true"
    environment:
      HTTP_PORT: 80
      HTTPS_PORT: 443
    ports:
      - 80:80
      - 443:443
    volumes:
      - proxy_data_conf_d:/etc/nginx/conf.d:rw
      - proxy_data_vhost_d:/etc/nginx/vhost.d:rw
      - proxy_data_html:/usr/share/nginx/html:rw
      - proxy_data_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped

  letsencrypt:
    image: nginxproxy/acme-companion:latest
    container_name: proxy_server_letsencrypt_1
    depends_on:
      - proxy
    volumes:
      - proxy_data_acme:/etc/acme.sh
      - proxy_data_conf_d:/etc/nginx/conf.d:rw
      - proxy_data_vhost_d:/etc/nginx/vhost.d:rw
      - proxy_data_html:/usr/share/nginx/html:rw
      - proxy_data_certs:/etc/nginx/certs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped


volumes:
  matrix_data:
  proxy_data_acme:
  proxy_data_conf_d:
  proxy_data_vhost_d:
  proxy_data_html:
  proxy_data_certs:
