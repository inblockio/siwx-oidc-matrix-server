services:
  matrix_synapse:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "8448:8448"
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_HOST}
      SYNAPSE_REPORT_STATS: ${MATRIX_REPORT_STATS}
      VIRTUAL_HOST: ${MATRIX_HOST}
      VIRTUAL_PORT: ${MATRIX_PORT}
      LETSENCRYPT_HOST: ${MATRIX_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    env_file:
      - .env
    depends_on:
      siwx-oidc:
        condition: service_healthy
      proxy:
        condition: service_started
      letsencrypt:
        condition: service_started
    # Route OIDC issuer hostname to the nginx proxy container so Synapse
    # can reach siwx-oidc via HTTPS without hairpin NAT through the
    # external IP (which times out from inside Docker).
    extra_hosts:
      - "${SIWEOIDC_HOST}:host-gateway"
    volumes:
      - matrix_data:/data
      - proxy_data_certs:/certs:rw

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  siwx-oidc:
    image: ghcr.io/inblockio/siwx-oidc:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - ${SIWEOIDC_PORT}:${SIWEOIDC_PORT}
    environment:
      SIWEOIDC_REDIS_URL: "redis://redis"
      SIWEOIDC_ADDRESS: 0.0.0.0
      SIWEOIDC_HOST: ${SIWEOIDC_HOST}
      SIWEOIDC_PORT: ${SIWEOIDC_PORT}
      SIWEOIDC_DEFAULT_CLIENTS: ${SIWEOIDC_DEFAULT_CLIENTS}
      SIWEOIDC_BASE_URL: ${SIWEOIDC_BASE_URL}
      RUST_LOG: ${RUST_LOG}
      VIRTUAL_HOST: ${SIWEOIDC_HOST}
      VIRTUAL_PORT: ${SIWEOIDC_PORT}
      LETSENCRYPT_HOST: ${SIWEOIDC_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./siwx-oidc-config/siwe-oidc.toml:/siwx-oidc/siwe-oidc.toml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${SIWEOIDC_PORT}/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: proxy_server_proxy_1
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy=true"
    environment:
      HTTP_PORT: 80
      HTTPS_PORT: 443
    ports:
      - 80:80
      - 443:443
    volumes:
      - proxy_data_conf_d:/etc/nginx/conf.d:rw
      - proxy_data_vhost_d:/etc/nginx/vhost.d:rw
      - proxy_data_html:/usr/share/nginx/html:rw
      - proxy_data_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped

  letsencrypt:
    image: nginxproxy/acme-companion:latest
    container_name: proxy_server_letsencrypt_1
    depends_on:
      - proxy
    volumes:
      - proxy_data_acme:/etc/acme.sh
      - proxy_data_conf_d:/etc/nginx/conf.d:rw
      - proxy_data_vhost_d:/etc/nginx/vhost.d:rw
      - proxy_data_html:/usr/share/nginx/html:rw
      - proxy_data_certs:/etc/nginx/certs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  matrix_data:
  proxy_data_acme:
  proxy_data_conf_d:
  proxy_data_vhost_d:
  proxy_data_html:
  proxy_data_certs:
